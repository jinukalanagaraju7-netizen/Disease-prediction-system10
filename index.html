<!DOCTYPE html>
<html>
<head>
<title>AI Disease Prediction System</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="door-container" id="loginPage">

<div class="door left-door"></div>
<div class="door right-door"></div>

<div class="login-box">

<h1>🩺 Disease Prediction System</h1>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<br><br>

<button onclick="login()">Enter System</button>

<p id="loginMsg"></p>

</div>

</div>



<div class="main" id="mainPage">

<h1>🤖 AI Disease Prediction</h1>

<h3>Select Symptoms</h3>

<div class="symptoms">

<label><input type="checkbox" value="Fever"> Fever</label>
<label><input type="checkbox" value="Cough"> Cough</label>
<label><input type="checkbox" value="Cold"> Cold</label>
<label><input type="checkbox" value="Headache"> Headache</label>
<label><input type="checkbox" value="Body Pain"> Body Pain</label>
<label><input type="checkbox" value="Vomiting"> Vomiting</label>
<label><input type="checkbox" value="Stomach Pain"> Stomach Pain</label>
<label><input type="checkbox" value="Diarrhea"> Diarrhea</label>
<label><input type="checkbox" value="Sweating"> Sweating</label>
<label><input type="checkbox" value="Chills"> Chills</label>
<label><input type="checkbox" value="Sneezing"> Sneezing</label>
<label><input type="checkbox" value="Runny Nose"> Runny Nose</label>

</div>

<br>

<button onclick="predictDisease()">Predict Disease</button>

<div id="results"></div>

</div>

<script src="script.js"></script>

</body>
</html>
