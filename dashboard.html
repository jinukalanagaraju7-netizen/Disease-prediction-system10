<!DOCTYPE html>
<html>
<head>

<title>Disease Prediction</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(45deg,#00c6ff,#0072ff);
color:white;
padding:30px;
}

.box{
background:white;
color:black;
padding:20px;
border-radius:10px;
display:inline-block;
}

button{
padding:10px 20px;
margin-top:20px;
border:none;
border-radius:5px;
background:#0072ff;
color:white;
cursor:pointer;
}

#result{
margin-top:30px;
font-size:22px;
font-weight:bold;
}

</style>

<script>

function predictDisease(){

var symptoms=[];

var checkboxes=document.querySelectorAll("input[name='symptom']:checked");

checkboxes.forEach(function(box){
symptoms.push(box.value);
});

var disease="No disease found";

if(symptoms.includes("fever") && symptoms.includes("cough")){
disease="Possible Disease: Flu";
}

else if(symptoms.includes("fever") && symptoms.includes("vomiting")){
disease="Possible Disease: Food Poisoning";
}

else if(symptoms.includes("headache") && symptoms.includes("blurvision")){
disease="Possible Disease: Migraine";
}

else if(symptoms.includes("fatigue") && symptoms.includes("weightloss")){
disease="Possible Disease: Diabetes";
}

else if(symptoms.includes("shortbreath") && symptoms.includes("chestpain")){
disease="Possible Disease: Heart Problem";
}

else if(symptoms.includes("itching") && symptoms.includes("rash")){
disease="Possible Disease: Skin Allergy";
}

document.getElementById("result").innerHTML=disease;

}

</script>

</head>

<body>

<h1>🩺 Disease Prediction System</h1>

<div class="box">

<h3>Select 2 or 3 Symptoms</h3>

<label><input type="checkbox" name="symptom" value="fever"> Fever</label><br>
<label><input type="checkbox" name="symptom" value="cough"> Cough</label><br>
<label><input type="checkbox" name="symptom" value="vomiting"> Vomiting</label><br>
<label><input type="checkbox" name="symptom" value="headache"> Headache</label><br>
<label><input type="checkbox" name="symptom" value="blurvision"> Blur Vision</label><br>
<label><input type="checkbox" name="symptom" value="fatigue"> Fatigue</label><br>
<label><input type="checkbox" name="symptom" value="weightloss"> Weight Loss</label><br>
<label><input type="checkbox" name="symptom" value="shortbreath"> Short Breath</label><br>
<label><input type="checkbox" name="symptom" value="chestpain"> Chest Pain</label><br>
<label><input type="checkbox" name="symptom" value="itching"> Itching</label><br>
<label><input type="checkbox" name="symptom" value="rash"> Skin Rash</label><br>

<br>

<button onclick="predictDisease()">Predict Disease</button>

</div>

<h2 id="result"></h2>

</body>
</html>
